; =============================================================
; Heltec LoRa Modem — Serial-to-SX1262 bridge for pymc_core
; Target: Heltec WiFi LoRa 32 V3 (ESP32-S3 + SX1262)
; =============================================================

[env:heltec_v3]
platform = espressif32
board = heltec_wifi_lora_32_V3
framework = arduino
monitor_speed = 921600
upload_speed = 921600
; OTA upload (after first flash over USB):
;   pio run -e heltec_v3 -t upload --upload-port heltec-<mac3>.local
; or plain HTTP:
;   curl -F firmware=@.pio/build/heltec_v3/firmware.bin http://heltec-<mac3>.local/update
; Board JSON pins default_8MB.csv (app0/app1/otadata) — OTA-ready.

lib_deps =
    jgromes/RadioLib@^7.1.0
    adafruit/Adafruit SSD1306@^2.5.7
    adafruit/Adafruit GFX Library@^1.11.5

build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=0
    -DARDUINO_USB_MODE=1
    -DCORE_DEBUG_LEVEL=0
    -DBOARD_HELTEC_V3
    ; SX1262 pin mapping for Heltec V3
    -DLORA_NSS=8
    -DLORA_DIO1=14
    -DLORA_RST=12
    -DLORA_BUSY=13
    ; OLED pins Heltec V3
    -DOLED_SDA=17
    -DOLED_SCL=18
    -DOLED_RST=21
    ; Default MeshCore radio params (overridable via SET_CONFIG)
    -DDEFAULT_FREQ=869618000
    -DDEFAULT_BW=62500
    -DDEFAULT_SF=8
    -DDEFAULT_CR=8
    -DDEFAULT_POWER=22
    -DDEFAULT_SYNCWORD=0x12
    -DDEFAULT_PREAMBLE=16
