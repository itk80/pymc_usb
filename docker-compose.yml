# pyMC Repeater — Heltec modem (Wi-Fi/TCP by default, USB-CDC optional)
#
# Defaults to tcp_heltec: no USB passthrough, no dialout permissions needed,
# Heltec lives anywhere on the LAN. Switch to usb_heltec by uncommenting
# the SERIAL_PORT env var and the `devices:` block at the bottom.
#
# Per-deployment overrides go in a `.env` file next to this compose file
# (gitignored). Typical contents:
#     HOST_PORT=8001
#     HELTEC_HOST=192.168.1.50
#     HELTEC_PORT=5055
#     ADMIN_PASSWORD=changeit
#
# Usage:
#   docker compose up -d --build
#   docker compose logs -f
#   Dashboard: http://localhost:${HOST_PORT:-8000}

services:
  repeater:
    build:
      context: .
      dockerfile: docker/Dockerfile
    image: pymc-usb-repeater:latest
    container_name: pymc-repeater
    restart: unless-stopped
    ports:
      - "${HOST_PORT:-8000}:8000"
    # Bind mounts so config / database / logs live on the HOST under
    # ./data, not in a docker-managed volume. Survives `docker rm`,
    # easy to back up, and you can edit config.yaml with your normal
    # editor. Directories are auto-created on first start; the
    # container chowns them to its `repeater` uid so the daemon (which
    # drops privileges via gosu) can write to them.
    volumes:
      - ./data/config:/etc/pymc_repeater
      - ./data/state:/var/lib/pymc_repeater
      - ./data/logs:/var/log/pymc_repeater
    environment:
      # ── Radio transport: "tcp_heltec" (default) or "usb_heltec" ──
      - RADIO_TYPE=tcp_heltec

      # ── TCP-mode settings (used when RADIO_TYPE=tcp_heltec) ──
      # Set HELTEC_HOST in your .env to the modem's LAN IP or mDNS name.
      # If left at the placeholder, the repeater starts in deferred-connect
      # mode and you provision the host via the web UI's setup wizard or
      # the "Heltec config" panel.
      - HELTEC_HOST=${HELTEC_HOST:-192.168.1.50}
      - HELTEC_PORT=${HELTEC_PORT:-5055}
      - HELTEC_TOKEN=${HELTEC_TOKEN:-}      # match the firmware NVS token, empty = open LAN

      # ── USB-mode settings (used when RADIO_TYPE=usb_heltec) ──
      # Also uncomment the `devices:` block below.
      # - SERIAL_PORT=/dev/ttyUSB0

      # ── Identity / web UI admin ──
      - NODE_NAME=${NODE_NAME:-pyMC_USB_RPT}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin123}     # change before exposing the dashboard

      # ── Optional radio overrides ──
      # - FREQUENCY=869618000
      # - TX_POWER=22
      # - SPREADING_FACTOR=8
      # - BANDWIDTH=62500

    # Uncomment only when RADIO_TYPE=usb_heltec and the Heltec is plugged in:
    # devices:
    #   - /dev/ttyUSB0:/dev/ttyUSB0
